name: Publish AUR

on:
  push:
    tags:
      - "v*-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, without the leading v"
        required: true
      pkgrel:
        description: "AUR package release number"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      AUR_HOME: /home/builder
      AUR_WORKDIR: /tmp/aur-packages

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed git openssh pacman-contrib cargo gtk4 libadwaita zstd github-cli
          useradd -m builder

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            pkgrel="${{ inputs.pkgrel }}"
          else
            release="${GITHUB_REF_NAME#v}"
            version="${release%-*}"
            pkgrel="${release##*-}"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+)*([._+][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi
          if [[ ! "$pkgrel" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid pkgrel: $pkgrel" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$pkgrel" >> "$GITHUB_OUTPUT"
          echo "release=${version}-${pkgrel}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-${pkgrel}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Build binary release archive
        shell: bash
        run: |
          cargo build --locked --release

          archive="waybar-google-calendar-bin-${{ steps.version.outputs.release }}-x86_64.tar.zst"
          pkgroot="$(mktemp -d)"
          install -Dm755 target/release/waybar-gcal "$pkgroot/usr/bin/waybar-gcal"
          install -Dm644 LICENSE "$pkgroot/usr/share/licenses/waybar-google-calendar-bin/LICENSE"
          install -Dm644 README.md "$pkgroot/usr/share/doc/waybar-google-calendar-bin/README.md"
          install -Dm644 examples/waybar-clock.json "$pkgroot/usr/share/doc/waybar-google-calendar-bin/examples/waybar-clock.json"
          install -Dm644 examples/custom-theme.css "$pkgroot/usr/share/doc/waybar-google-calendar-bin/examples/custom-theme.css"
          install -Dm644 assets/themes/apple-light.css "$pkgroot/usr/share/waybar-google-calendar/themes/apple-light.css"
          tar --zstd -cf "$archive" -C "$pkgroot" usr

      - name: Publish GitHub release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          archive="waybar-google-calendar-bin-${{ steps.version.outputs.release }}-x86_64.tar.zst"

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" "$archive" --clobber
          else
            gh release create "$tag" "$archive" --title "$tag" --notes "Release $tag" --verify-tag --latest=false
          fi

      - name: Generate AUR metadata
        shell: bash
        run: |
          for package_dir in packaging/aur packaging/aur-bin; do
            sed -i \
              -e "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" \
              -e "s/^pkgrel=.*/pkgrel=${{ steps.version.outputs.pkgrel }}/" \
              "$package_dir/PKGBUILD"
          done

          chown -R builder:builder "$GITHUB_WORKSPACE"
          for package_dir in packaging/aur packaging/aur-bin; do
            runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE/$package_dir' && updpkgsums && makepkg --printsrcinfo > .SRCINFO"
          done

      - name: Configure AUR SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "Missing GitHub secret: AUR_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          install -d -m 700 -o builder -g builder "$AUR_HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > "$AUR_HOME/.ssh/aur"
          chown builder:builder "$AUR_HOME/.ssh/aur"
          chmod 600 "$AUR_HOME/.ssh/aur"
          runuser -u builder -- ssh-keygen -y -f "$AUR_HOME/.ssh/aur" > /dev/null

          ssh-keyscan -t ed25519 aur.archlinux.org > "$AUR_HOME/.ssh/known_hosts"
          chmod 600 "$AUR_HOME/.ssh/known_hosts"
          {
            printf '%s\n' "Host aur.archlinux.org"
            printf '%s\n' "  HostName aur.archlinux.org"
            printf '%s\n' "  User aur"
            printf '%s\n' "  IdentityFile $AUR_HOME/.ssh/aur"
            printf '%s\n' "  IdentitiesOnly yes"
            printf '%s\n' "  UserKnownHostsFile $AUR_HOME/.ssh/known_hosts"
            printf '%s\n' "  StrictHostKeyChecking yes"
          } > "$AUR_HOME/.ssh/config"
          chown builder:builder "$AUR_HOME/.ssh/config" "$AUR_HOME/.ssh/known_hosts"
          chmod 600 "$AUR_HOME/.ssh/config"
          runuser -u builder -- env HOME="$AUR_HOME" ssh -F "$AUR_HOME/.ssh/config" -T aur.archlinux.org help

      - name: Push package to AUR
        shell: bash
        run: |
          export GIT_SSH_COMMAND="ssh -F $AUR_HOME/.ssh/config"

          publish_package() {
            local package_dir="$1"
            local pkgname
            local aur_url
            local workdir

            pkgname="$(. "$package_dir/PKGBUILD" && printf '%s' "$pkgname")"
            aur_url="ssh://aur@aur.archlinux.org/${pkgname}.git"
            workdir="$AUR_WORKDIR/$pkgname"

            rm -rf "$workdir"
            if ! runuser -u builder -- env HOME="$AUR_HOME" GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git clone "$aur_url" "$workdir"; then
              echo "AUR repository $pkgname does not exist yet; preparing first publish."
              install -d -m 755 -o builder -g builder "$workdir"
              runuser -u builder -- git init --initial-branch=master "$workdir"
              runuser -u builder -- git -C "$workdir" remote add origin "$aur_url"
            fi

            cp "$package_dir/PKGBUILD" "$package_dir/.SRCINFO" "$workdir/"
            chown builder:builder "$workdir/PKGBUILD" "$workdir/.SRCINFO"
            runuser -u builder -- git -C "$workdir" config user.name "github-actions[bot]"
            runuser -u builder -- git -C "$workdir" config user.email "github-actions[bot]@users.noreply.github.com"
            runuser -u builder -- git -C "$workdir" add PKGBUILD .SRCINFO

            if runuser -u builder -- git -C "$workdir" diff --cached --quiet; then
              echo "AUR package $pkgname is already up to date."
              return 0
            fi

            runuser -u builder -- git -C "$workdir" commit -m "Release ${{ steps.version.outputs.release }}"
            runuser -u builder -- env HOME="$AUR_HOME" GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git -C "$workdir" push origin HEAD:master
          }

          publish_package packaging/aur
          publish_package packaging/aur-bin
