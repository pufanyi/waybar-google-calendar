name: Publish AUR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v"
        required: true

permissions:
  contents: read

jobs:
  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed git openssh pacman-contrib
          useradd -m builder

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+)*([._+-][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate AUR metadata
        shell: bash
        run: |
          sed -i \
            -e "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            packaging/aur/PKGBUILD
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE/packaging/aur' && updpkgsums && makepkg --printsrcinfo > .SRCINFO"

      - name: Configure AUR SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "Missing GitHub secret: AUR_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Push package to AUR
        shell: bash
        run: |
          pkgname="$(. packaging/aur/PKGBUILD && printf '%s' "$pkgname")"
          rm -rf /tmp/aur-package
          git clone "ssh://aur@aur.archlinux.org/${pkgname}.git" /tmp/aur-package

          cp packaging/aur/PKGBUILD packaging/aur/.SRCINFO /tmp/aur-package/
          cd /tmp/aur-package
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi

          git commit -m "Release ${{ steps.version.outputs.version }}"
          git push
