name: Publish AUR

on:
  push:
    tags:
      - "v*"
      - "aur-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without the leading v"
        required: true
      pkgrel:
        description: "AUR package release number"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    env:
      AUR_HOME: /home/builder
      AUR_WORKDIR: /tmp/aur-package

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed git openssh pacman-contrib
          useradd -m builder

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            pkgrel="${{ inputs.pkgrel }}"
          elif [[ "$GITHUB_REF_NAME" == aur-v* ]]; then
            release="${GITHUB_REF_NAME#aur-v}"
            version="${release%-*}"
            pkgrel="${release##*-}"
          else
            version="${GITHUB_REF_NAME#v}"
            pkgrel="1"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+)*([._+][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi
          if [[ ! "$pkgrel" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid pkgrel: $pkgrel" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "pkgrel=$pkgrel" >> "$GITHUB_OUTPUT"

      - name: Generate AUR metadata
        shell: bash
        run: |
          sed -i \
            -e "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" \
            -e "s/^pkgrel=.*/pkgrel=${{ steps.version.outputs.pkgrel }}/" \
            packaging/aur/PKGBUILD
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -lc "cd '$GITHUB_WORKSPACE/packaging/aur' && updpkgsums && makepkg --printsrcinfo > .SRCINFO"

      - name: Configure AUR SSH
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "Missing GitHub secret: AUR_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          install -d -m 700 -o builder -g builder "$AUR_HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" | tr -d '\r' > "$AUR_HOME/.ssh/aur"
          chown builder:builder "$AUR_HOME/.ssh/aur"
          chmod 600 "$AUR_HOME/.ssh/aur"
          runuser -u builder -- ssh-keygen -y -f "$AUR_HOME/.ssh/aur" > /dev/null

          ssh-keyscan -t ed25519 aur.archlinux.org > "$AUR_HOME/.ssh/known_hosts"
          chmod 600 "$AUR_HOME/.ssh/known_hosts"
          {
            printf '%s\n' "Host aur.archlinux.org"
            printf '%s\n' "  HostName aur.archlinux.org"
            printf '%s\n' "  User aur"
            printf '%s\n' "  IdentityFile $AUR_HOME/.ssh/aur"
            printf '%s\n' "  IdentitiesOnly yes"
            printf '%s\n' "  UserKnownHostsFile $AUR_HOME/.ssh/known_hosts"
            printf '%s\n' "  StrictHostKeyChecking yes"
          } > "$AUR_HOME/.ssh/config"
          chown builder:builder "$AUR_HOME/.ssh/config" "$AUR_HOME/.ssh/known_hosts"
          chmod 600 "$AUR_HOME/.ssh/config"
          runuser -u builder -- env HOME="$AUR_HOME" ssh -F "$AUR_HOME/.ssh/config" -T aur.archlinux.org help

      - name: Push package to AUR
        shell: bash
        run: |
          pkgname="$(. packaging/aur/PKGBUILD && printf '%s' "$pkgname")"
          aur_url="ssh://aur@aur.archlinux.org/${pkgname}.git"
          export GIT_SSH_COMMAND="ssh -F $AUR_HOME/.ssh/config"

          rm -rf "$AUR_WORKDIR"
          if ! runuser -u builder -- env HOME="$AUR_HOME" GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git clone "$aur_url" "$AUR_WORKDIR"; then
            echo "AUR repository does not exist yet; preparing first publish."
            install -d -m 755 -o builder -g builder "$AUR_WORKDIR"
            runuser -u builder -- git init --initial-branch=master "$AUR_WORKDIR"
            runuser -u builder -- git -C "$AUR_WORKDIR" remote add origin "$aur_url"
          fi

          cp packaging/aur/PKGBUILD packaging/aur/.SRCINFO "$AUR_WORKDIR/"
          chown builder:builder "$AUR_WORKDIR/PKGBUILD" "$AUR_WORKDIR/.SRCINFO"
          runuser -u builder -- git -C "$AUR_WORKDIR" config user.name "github-actions[bot]"
          runuser -u builder -- git -C "$AUR_WORKDIR" config user.email "github-actions[bot]@users.noreply.github.com"
          runuser -u builder -- git -C "$AUR_WORKDIR" add PKGBUILD .SRCINFO

          if runuser -u builder -- git -C "$AUR_WORKDIR" diff --cached --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi

          runuser -u builder -- git -C "$AUR_WORKDIR" commit -m "Release ${{ steps.version.outputs.version }}-${{ steps.version.outputs.pkgrel }}"
          runuser -u builder -- env HOME="$AUR_HOME" GIT_SSH_COMMAND="$GIT_SSH_COMMAND" git -C "$AUR_WORKDIR" push origin HEAD:master
